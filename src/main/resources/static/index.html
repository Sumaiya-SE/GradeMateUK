<!DOCTYPE html>
<html>
<head>
    <title>Degree GPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Welcome to Your GPA Calculator</h1>

    <label for="username">Enter Your Name:</label>
    <input type="text" id="username" placeholder="Your name here"><br><br>

    <label for="year">Select Year of Study:</label>
    <select id="year">
        <option value="1">1st Year</option>
        <option value="2">2nd Year</option>
        <option value="3">Final Year</option>
    </select><br><br>

    <label for="modules">Number of Modules:</label>
    <input type="number" id="modules" value="3" min="1"><br><br>

    <button onclick="startCalculator()">Next</button>
</div>

<script>
function startCalculator() {
    const name = document.getElementById("username").value.trim();
    const year = document.getElementById("year").value;
    const modules = document.getElementById("modules").value;

    if(!name || !year || !modules) {
        alert("Please fill in all fields!");
        return;
    }

    localStorage.setItem("username", name);
    localStorage.setItem("year", year);
    localStorage.setItem("modules", modules);

    window.location.href = "modules.html";
}
</script>
</body>
</html>
